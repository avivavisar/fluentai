services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fluentai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fluentai
      POSTGRES_PASSWORD: fluentai
      POSTGRES_DB: fluentai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluentai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fluentai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
