name: fluentai
description: FluentAI - AI English tutor for Hebrew speakers
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  http: ^1.2.2
  gotrue: ^2.11.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Heebo
      fonts:
        - asset: assets/fonts/Heebo.ttf
